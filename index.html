<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Display a Map</title>
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <style>
      #map {
        width: 100%;
        height: 500px; /* This is the magic line */
        background-color: #eee; /* This helps you see if the div is there at least */
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <script>
      // Your extracted token
      mapboxgl.accessToken =
        "pk.eyJ1IjoizGVsdGEtc3R1ZHlsbnQiLCJhIjoiY2xvMDK0MTVlMTJ3ZDJrcGR5ZDFkaHl4ciJ9.Gj2VU1wvxc7rFVt5E4KL0Q";

      const map = new mapboxgl.Map({
        container: "map",
        style: "mapbox://styles/mapbox/streets-v12",
        center: [72.8777, 19.076], // Centered on Mumbai
        zoom: 10,
      });

      // Add navigation controls (optional but helps see if it's working)
      map.addControl(new mapboxgl.NavigationControl());
    </script>
  </body>
</html>
